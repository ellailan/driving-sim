<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vancouver Drive - Unified Controls</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Courier New', monospace; overflow: hidden; }
  #ui { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
  #hud { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 32px; align-items: flex-end; }
  .hud-panel { background: rgba(0,0,0,0.85); border: 1px solid rgba(255,200,50,0.6); border-radius: 4px; padding: 12px 20px; color: #ffd700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .hud-val { font-size: 32px; display: block; line-height: 1; margin-top: 2px; color: #fff; }
  #location-tag { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 1px solid rgba(255,200,50,0.6); border-radius: 3px; color: #ffd700; font-size: 14px; letter-spacing: 0.2em; padding: 10px 24px; text-transform: uppercase; }
  #controls-hint { position: absolute; bottom: 120px; right: 24px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 14px 18px; color: rgba(255,255,255,0.8); font-size: 11px; line-height: 1.8; }
  canvas { display: block; }
  #compass { position: absolute; top: 20px; right: 24px; width: 60px; height: 60px; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,200,50,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="location-tag">📍 Vancouver City Center</div>
  <div id="compass">
    <svg id="compass-needle" width="36" height="36" viewBox="0 0 30 30">
      <polygon points="15,3 18,15 15,13 12,15" fill="#ff4444"/>
      <polygon points="15,27 18,15 15,17 12,15" fill="#aaa"/>
    </svg>
  </div>
  <div id="hud">
    <div class="hud-panel">Speed<span class="hud-val" id="speed-val">0</span> km/h</div>
    <div class="hud-panel">Heading<span class="hud-val" id="heading-val">N</span></div>
    <div class="hud-panel">Coords<span class="hud-val" id="coord-val" style="font-size:14px;margin-top:6px">49.2827°N</span></div>
  </div>
  <div id="controls-hint">
    <b>GAS:</b> W / ↑<br>
    <b>BRAKE:</b> S / ↓ / SPACE<br>
    <b>STEER:</b> A / D / ← →
  </div>
</div>

<script>
// --- Canvas & Map Configuration ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const TILE_SIZE = 256;
const ZOOM = 18;

function lat2tile(lat, zoom) { return (1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom); }
function lon2tile(lon, zoom) { return (lon + 180) / 360 * Math.pow(2, zoom); }
function tile2lat(y, zoom) { const n = Math.PI - 2 * Math.PI * y / Math.pow(2, zoom); return (180 / Math.PI) * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n))); }
function tile2lon(x, zoom) { return x / Math.pow(2, zoom) * 360 - 180; }

let camX = lon2tile(-123.1207, ZOOM);
let camY = lat2tile(49.2827, ZOOM);
const tileCache = {};
const tileLoading = {};

function getTile(tx, ty, zoom) {
  const key = `${zoom}/${tx}/${ty}`;
  if (tileCache[key]) return tileCache[key];
  if (tileLoading[key]) return null;
  tileLoading[key] = true;
  const servers = ['a','b','c'];
  const s = servers[(tx + ty) % 3];
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { tileCache[key] = img; delete tileLoading[key]; };
  img.src = `https://${s}.tile.openstreetmap.org/${zoom}/${tx}/${ty}.png`;
  return null;
}

// --- Car State & Proportional Physics ---
const CAR_W = 42; 
const CAR_H = 80;

let car = {
  x: camX,
  y: camY,
  angle: 0,
  speed: 0,
  maxSpeed: 0.006,    
  accel: 0.00012,    
  brakePower: 0.00025,
  friction: 0.985,   
  turnSpeed: 0.055,  
};

const keys = {};
window.addEventListener('keydown', e => { 
  keys[e.code] = true; 
  // Prevent scrolling for all gameplay keys
  if(["Space", "ArrowUp", "ArrowDown", "KeyW", "KeyS", "ArrowLeft", "ArrowRight", "KeyA", "KeyD"].includes(e.code)) e.preventDefault(); 
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function drawMap() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const tilesX = Math.ceil(canvas.width / TILE_SIZE) + 2;
  const tilesY = Math.ceil(canvas.height / TILE_SIZE) + 2;
  const startTX = Math.floor(car.x - tilesX / 2);
  const startTY = Math.floor(car.y - tilesY / 2);

  for (let dx = 0; dx <= tilesX; dx++) {
    for (let dy = 0; dy <= tilesY; dy++) {
      const tx = startTX + dx;
      const ty = startTY + dy;
      const img = getTile(tx, ty, ZOOM);
      const sx = cx + (tx - car.x) * TILE_SIZE;
      const sy = cy + (ty - car.y) * TILE_SIZE;
      if (img) ctx.drawImage(img, sx, sy, TILE_SIZE, TILE_SIZE);
    }
  }
}

function drawCar() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(car.angle);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(-CAR_W/2 + 5, -CAR_H/2 + 5, CAR_W, CAR_H);
  ctx.fillStyle = '#e63946';
  ctx.fillRect(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H);
  ctx.fillStyle = '#222';
  ctx.fillRect(-CAR_W/2 + 4, -CAR_H/2 + 15, CAR_W - 8, 40);
  ctx.fillStyle = 'rgba(180,220,255,0.9)';
  ctx.fillRect(-CAR_W/2 + 6, -CAR_H/2 + 18, CAR_W - 12, 12);
  ctx.restore();
}

// --- Logic Implementation ---
function update() {
  const gas   = keys['KeyW']  || keys['ArrowUp']; //
  // Consolidated Brake: Down Arrow, S, and Space all trigger brakePower
  const brake = keys['KeyS']  || keys['ArrowDown'] || keys['Space']; 
  const left  = keys['KeyA']  || keys['ArrowLeft'];
  const right = keys['KeyD']  || keys['ArrowRight'];

  // Acceleration (Forward only)
  if (gas) {
    car.speed = Math.min(car.speed + car.accel, car.maxSpeed);
  }

  // Unified Braking (No reverse)
  if (brake) {
    car.speed = Math.max(car.speed - car.brakePower, 0);
  }

  // Rolling friction
  if (!gas) car.speed *= car.friction;

  // Stop clamp
  if (car.speed < 0.00001) car.speed = 0;

  // Steering
  if (car.speed > 0) {
    const turnSensitivity = Math.min(car.speed / (car.maxSpeed * 0.2), 1.0);
    const turn = car.turnSpeed * turnSensitivity;
    if (left)  car.angle -= turn;
    if (right) car.angle += turn;
  }

  car.x += Math.sin(car.angle) * car.speed;
  car.y -= Math.cos(car.angle) * car.speed;

  // HUD Update
  const kmh = Math.round(car.speed / car.maxSpeed * 120);
  const speedEl = document.getElementById('speed-val');
  speedEl.textContent = kmh;
  speedEl.style.color = brake ? '#ff4444' : '#fff';

  const deg = ((car.angle * 180 / Math.PI) % 360 + 360) % 360;
  const dirs = ['N','NE','E','SE','S','SW','W','NW','N'];
  document.getElementById('heading-val').textContent = dirs[Math.round(deg / 45)];
  
  const lat = tile2lat(car.y, ZOOM);
  const lon = tile2lon(car.x, ZOOM);
  document.getElementById('coord-val').textContent =
    `${Math.abs(lat).toFixed(4)}°N ${Math.abs(lon).toFixed(4)}°W`;
  document.getElementById('compass-needle').style.transform = `rotate(${car.angle}rad)`;
}

function loop() {
  update();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMap();
  drawCar();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
